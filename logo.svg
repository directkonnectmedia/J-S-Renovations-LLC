<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 100" role="img" aria-label="J&amp;S Renovations LLC">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#d3d8e0"/>
      <stop offset="70%" stop-color="#b9c0cc"/>
      <stop offset="100%" stop-color="#a3abb8"/>
    </radialGradient>
    <!-- Reusable letter renderers: each glyph is drawn as 3 stacked layers
         (outer colored stroke -> white stroke -> solid fill) to create the
         thin colored + thin white + solid-fill border effect. -->
    <style>
      .serif { font-family: Georgia, 'Times New Roman', serif; font-weight: 700; font-style: italic; }
      .sans  { font-family: 'Arial Black', Arial, 'Helvetica Neue', sans-serif; font-weight: 800; }
      .big   { font-size: 58px; }
      .sub   { font-size: 18px; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- background badge -->
  <rect x="1" y="1" width="218" height="98" rx="7" fill="url(#bg)"/>

  <!-- ===== J  (black fill, white inner outline, red outer outline) ===== -->
  <g text-anchor="middle">
    <text class="serif big" x="58" y="62" fill="none" stroke="#b01722" stroke-width="7" stroke-linejoin="round">J</text>
    <text class="serif big" x="58" y="62" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linejoin="round">J</text>
    <text class="serif big" x="58" y="62" fill="#111111">J</text>

    <!-- ===== &  (red fill, white outline) ===== -->
    <text class="serif big" x="104" y="62" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linejoin="round">&amp;</text>
    <text class="serif big" x="104" y="62" fill="#c8102e">&amp;</text>

    <!-- ===== S  (black fill, white inner outline, blue outer outline) ===== -->
    <text class="serif big" x="150" y="62" fill="none" stroke="#1d4ed8" stroke-width="7" stroke-linejoin="round">S</text>
    <text class="serif big" x="150" y="62" fill="none" stroke="#ffffff" stroke-width="3.4" stroke-linejoin="round">S</text>
    <text class="serif big" x="150" y="62" fill="#111111">S</text>
  </g>

  <!-- ===== Renovations LLC  (red fill, white outline, sans-serif, smaller) ===== -->
  <g text-anchor="middle">
    <text class="sans sub" x="110" y="88" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linejoin="round">Renovations LLC</text>
    <text class="sans sub" x="110" y="88" fill="#c8102e">Renovations LLC</text>
  </g>
</svg>
